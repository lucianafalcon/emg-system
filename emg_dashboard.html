<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMG Live Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: #7eb8f7;
    margin-bottom: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Configuración IP */
  #config {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  #config input {
    background: #1e2130;
    border: 1px solid #3a3f55;
    color: #e0e0e0;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 0.95rem;
    width: 200px;
  }

  #config button {
    background: #3b6fd4;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.2s;
  }

  #config button:hover { background: #5588ee; }

  /* Estado conexión */
  #status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 0.9rem;
  }

  #dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #666;
    transition: background 0.3s;
  }

  #dot.connected    { background: #44dd88; }
  #dot.disconnected { background: #dd4444; }

  /* Tarjetas de estado */
  .cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .card {
    background: #1e2130;
    border: 1px solid #2a2f45;
    border-radius: 12px;
    padding: 18px 32px;
    text-align: center;
    min-width: 160px;
  }

  .card .label {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card .value {
    font-size: 2rem;
    font-weight: bold;
    font-family: monospace;
  }

  .card .estado {
    font-size: 1rem;
    font-weight: bold;
    margin-top: 6px;
    letter-spacing: 2px;
  }

  .estado.ACT { color: #44dd88; }
  .estado.REL { color: #7eb8f7; }
  .estado.NO  { color: #666; }

  /* Gráficas */
  .chart-container {
    background: #1e2130;
    border: 1px solid #2a2f45;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .chart-title {
    font-size: 0.85rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  canvas { max-height: 220px; }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    font-size: 0.85rem;
    color: #666;
    margin-top: 10px;
  }

  .stats span { color: #aaa; }
</style>
</head>
<body>

<h1>EMG Live Monitor</h1>

<!-- Configuración IP -->
<div id="config">
  <input id="ip-input" type="text" placeholder="ESP32 IP (e.g. 192.168.0.10)" />
  <button onclick="conectar()">Connect</button>
  <button onclick="desconectar()" style="background:#aa3333;">Disconnect</button>
</div>

<!-- Estado -->
<div id="status-bar">
  <div id="dot" class="disconnected"></div>
  <span id="status-text">Disconnected</span>
</div>

<!-- Tarjetas -->
<div class="cards">
  <div class="card">
    <div class="label">EMG 1 — Raw</div>
    <div class="value" id="val1">—</div>
    <div class="estado NO" id="est1">---</div>
  </div>
  <div class="card">
    <div class="label">EMG 2 — Raw</div>
    <div class="value" id="val2">—</div>
    <div class="estado NO" id="est2">---</div>
  </div>
  <div class="card">
    <div class="label">Samples/sec</div>
    <div class="value" id="sps">0</div>
  </div>
</div>

<!-- Gráfica EMG1 -->
<div class="chart-container">
  <div class="chart-title">EMG 1</div>
  <canvas id="chart1"></canvas>
</div>

<!-- Gráfica EMG2 -->
<div class="chart-container">
  <div class="chart-title">EMG 2</div>
  <canvas id="chart2"></canvas>
</div>

<div class="stats">
  Last <span>200</span> samples &nbsp;|&nbsp; Rango ADC: <span>0 – 4095</span>
</div>

<script>
/* ── Configuración ───────────────────────────────────────── */
const MAX_POINTS = 200;

/* ── Estado ─────────────────────────────────────────────── */
let ws = null;
let sps_count = 0;

/* ── Datos de gráficas ───────────────────────────────────── */
const labels = Array(MAX_POINTS).fill('');
const data1  = Array(MAX_POINTS).fill(null);
const data2  = Array(MAX_POINTS).fill(null);

/* ── Helpers Chart.js ────────────────────────────────────── */
function makeChart(id, color, label) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data: id === 'chart1' ? data1 : data2,
        borderColor: color,
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.2,
        fill: true,
        backgroundColor: color + '18'
      }]
    },
    options: {
      animation: false,
      responsive: true,
      scales: {
        x: { display: false },
        y: {
          min: 0, max: 4095,
          ticks: { color: '#666', stepSize: 1024 },
          grid:  { color: '#2a2f45' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

const chart1 = makeChart('chart1', '#7eb8f7', 'EMG1');
const chart2 = makeChart('chart2', '#f7a87e', 'EMG2');

/* ── WebSocket ───────────────────────────────────────────── */
function conectar() {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) { alert('Enter ESP32 IP'); return; }

  if (ws) ws.close();

  ws = new WebSocket(`ws://${ip}:81`);

  ws.onopen = () => {
    document.getElementById('dot').className = 'connected';
    document.getElementById('status-text').textContent = `Connected to ${ip}:81`;
  };

  ws.onclose = () => {
    document.getElementById('dot').className = 'disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
  };

  ws.onerror = () => {
    document.getElementById('status-text').textContent = 'Connection error';
  };

  ws.onmessage = (evt) => {
    /* Formato esperado: "1234,987,ACT,REL" */
    const parts = evt.data.split(',');
    if (parts.length < 4) return;

    const v1  = parseInt(parts[0]);
    const v2  = parseInt(parts[1]);
    const st1 = parts[2].trim();
    const st2 = parts[3].trim();

    /* Actualizar tarjetas */
    document.getElementById('val1').textContent = v1;
    document.getElementById('val2').textContent = v2;

    const e1 = document.getElementById('est1');
    e1.textContent  = st1;
    e1.className    = 'estado ' + (st1 === 'ACT' ? 'ACT' : st1 === 'REL' ? 'REL' : 'NO');

    const e2 = document.getElementById('est2');
    e2.textContent  = st2;
    e2.className    = 'estado ' + (st2 === 'ACT' ? 'ACT' : st2 === 'REL' ? 'REL' : 'NO');

    /* Agregar puntos a las gráficas (desplazar buffer) */
    data1.push(v1); if (data1.length > MAX_POINTS) data1.shift();
    data2.push(v2); if (data2.length > MAX_POINTS) data2.shift();

    chart1.update('none');
    chart2.update('none');

    sps_count++;
  };
}

function desconectar() {
  if (ws) { ws.close(); ws = null; }
}

/* ── Contador samples/seg ───────────────────────────────── */
setInterval(() => {
  document.getElementById('sps').textContent = sps_count;
  sps_count = 0;
}, 1000);
</script>

</body>
</html>
